name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx jest --ci

  server:
    name: server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx jest --ci

  workers:
    name: workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workers/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx jest --ci

  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Pull integration test images
        run: docker pull postgres:17-alpine
      - name: Test
        run: go test -tags=integration ./...

  slo:
    name: slo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install promtool
        run: |
          PROM_VERSION=3.13.0
          curl --retry 3 --retry-all-errors -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" -o /tmp/prom.tgz
          tar -xzf /tmp/prom.tgz -C /tmp
          echo "/tmp/prometheus-${PROM_VERSION}.linux-amd64" >> "$GITHUB_PATH"
      - name: Check SLO rules
        run: promtool check rules backend/ops/slo/recording.yml backend/ops/slo/alerts.yml
      - name: Test SLO rules
        working-directory: backend/ops/slo/tests
        run: promtool test rules recording_test.yml alerts_test.yml
